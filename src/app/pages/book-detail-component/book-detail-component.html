<div class="container mt-5">

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="libro && !loading" class="card shadow p-4">

    <h2 class="mb-4">{{ libro.titulo }}</h2>

    <div class="row mb-3">
      <div class="col-md-6">
        <strong>Autor:</strong>
        <p>{{ libro.autor }}</p>
      </div>

      <div class="col-md-6">
        <strong>Editorial:</strong>
        <p>{{ libro.editorial }}</p>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <strong>Categoría:</strong>
        <p>{{ libro.categoria }}</p>
      </div>

      <div class="col-md-6">
        <strong>ISBN:</strong>
        <p>{{ libro.isbn }}</p>
      </div>
    </div>

    <div class="mt-3">
      <strong>Estado:</strong>
      <span 
        class="badge ms-2"
        [ngClass]="libro.disponible ? 'bg-success' : 'bg-danger'">
        {{ libro.disponible ? 'Disponible' : 'No disponible' }}
      </span>
    </div>

  </div>

  <div *ngIf="!libro && !loading" class="alert alert-danger">
    Libro no encontrado.
  </div>

</div>
