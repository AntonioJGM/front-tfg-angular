<div class="container-fluid">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
    <div class="d-flex align-items-center">
      <img src="assets/logo.jpeg" alt="Go & Read" class="img-fluid" style="max-width: 100px;" />
      <h3 class="mb-0 ms-2">Go & Read</h3>
    </div>
    <div class="d-flex align-items-center">
      <input type="text" class="form-control me-2" placeholder="Buscar libro..." />
      <button class="btn btn-outline-primary"><i class="bi bi-person"></i></button>
      <button class="btn btn-outline-secondary ms-2"><i class="bi bi-bell"></i></button>
    </div>
  </div>

  <div class="row mt-4">
    <!-- Sidebar -->
    <div class="col-md-2">
      <ul class="list-group">
        <li class="list-group-item active">Todos los libros</li>
        <li class="list-group-item" *ngFor="let categoria of categorias">{{ categoria }}</li>
        <li class="list-group-item mt-3">Iniciar sesión</li>
        <li class="list-group-item">Ayuda</li>
      </ul>
    </div>

    <!-- Contenido principal: libros -->
    <div class="col-md-10">
      <h4 class="mb-3">LIBROS</h4>
      <div class="row g-4">
        <app-book-list></app-book-list>
      </div>
    </div>
  </div>
</div>
