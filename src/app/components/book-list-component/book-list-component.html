<div class="container mt-4">
  <h3 class="mb-4">Todos los libros</h3>
  <div class="row g-4">
    @for(libro of libros(); track libro.idLibro) {
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 shadow-sm hover-shadow">
            <!-- <img [src]="libro.portadaUrl" class="card-img-top" alt="{{ libro.titulo }}"> -->
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ libro.titulo }}</h5>
                    <p class="card-text text-truncate">{{ libro.autor }}</p>
                    <a [routerLink]="['/book', libro.idLibro]" class="btn btn-primary mt-auto w-100">
                    Ver detalle
                    </a>
                </div>
            </div>
        </div>
    }
  </div>
</div>
