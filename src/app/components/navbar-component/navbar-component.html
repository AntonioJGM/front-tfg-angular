<nav class="navbar navbar-expand-lg bg-white border-bottom py-2">

  <div class="container-fluid">

    <!-- Logo + Nombre -->
    <a class="navbar-brand d-flex align-items-center" [routerLink]="['/']">
      <img src="assets/logo.jpeg"
           alt="Go & Read"
           style="height: 90px;"
           class="me-2">
      <span class="fw-semibold">Go & Read</span>
    </a>

    <!-- Botones derecha -->
    <div class="d-flex align-items-center gap-2">

        <input type="text" class="form-control me-2" placeholder="Buscar libro..." 
        [(ngModel)]="terminoBusqueda" (input)="buscarLibro()"/>

      <!-- Botón Home -->
      <button class="btn btn-outline-secondary btn-sm"
              [routerLink]="['/']">
        <i class="bi bi-house"></i>
      </button>

      <!-- Dropdown Usuario -->
        <div class="dropdown">
            <button class="btn btn-outline-primary btn-sm dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown">
                <i class="bi bi-person"></i>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" [routerLink]="['/perfil']">
                        Ver perfil
                    </a>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li>
                    <button class="dropdown-item text-danger"

                        Cerrar sesión
                    </button>
                </li>
            </ul>
        </div>

    </div>

  </div>
